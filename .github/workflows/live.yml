name: live

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-e2e:
    if: github.repository == 'nickderobertis/cloud-agent-dev-env'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Assert cold command surface
        run: |
          if command -v just >/dev/null 2>&1; then
            echo "ERROR: just is already on PATH before live e2e; the live job must prove startup installs it." >&2
            exit 1
          fi

      - name: Live e2e
        env:
          CODEX_CI: "1"
          CODEX_THREAD_ID: live-e2e
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          scripts/session-setup.sh

          if ! test -f .local/state/setup-env-status.txt; then
            echo "ERROR: setup did not write .local/state/setup-env-status.txt." >&2
            exit 1
          fi
          if ! grep -qx "github_token_present=yes" .local/state/setup-env-status.txt; then
            echo "ERROR: GH_TOKEN was not visible during the simulated Codex Cloud setup phase." >&2
            exit 1
          fi
          if ! grep -qx "github_token_persisted=yes" .local/state/setup-env-status.txt; then
            echo "ERROR: setup did not persist GH_TOKEN for the agent phase." >&2
            exit 1
          fi
          if ! test -f .local/state/cloud-agent-dev-env.env; then
            echo "ERROR: setup did not write .local/state/cloud-agent-dev-env.env." >&2
            exit 1
          fi

          env -u GH_TOKEN -u GITHUB_TOKEN -u GITHUB_PAT -u GITHUB_PERSONAL_ACCESS_TOKEN scripts/live-e2e.sh
