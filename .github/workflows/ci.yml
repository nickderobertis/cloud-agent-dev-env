name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: extractions/setup-just@v2

      - name: Install shell tools
        run: |
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            brew install shellcheck shfmt
          else
            sudo apt-get update
            sudo apt-get install -y shellcheck
            go install mvdan.cc/sh/v3/cmd/shfmt@latest
            echo "$HOME/go/bin" >> "$GITHUB_PATH"
          fi

      - name: Bootstrap
        run: just bootstrap

      - name: Check
        run: just check

  llmlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: extractions/setup-just@v2
      - uses: astral-sh/setup-uv@v6
      - name: Install llmlint toolchain
        run: scripts/setup-llmlint.sh
      - name: Validate llmlint config
        run: just lint-llm-validate --diff-base origin/main
      - name: Lint changed files
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::llmlint needs OPENAI_API_KEY for the Codex harness" >&2
            exit 1
          fi
          npm install -g @openai/codex
          just lint-llm-diff origin/main

